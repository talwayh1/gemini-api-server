services:
  gemini-api:
    image: ghcr.io/talwayh1/gemini-api-server:latest
    container_name: gemini-api
    restart: unless-stopped
    ports:
      - "8787:8000"
    volumes:
      - ./config:/app/config:ro
      - ./cache:/app/cache
    environment:
      - GEMINI_COOKIE_PATH=/app/cache
    # Docker 原生健康检查（配合 HEALTHCHECK 指令）
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
